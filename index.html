};
const AlertBox = ({ type="warn", text }) => {
    const s = { warn:"bg-amber-50 border-amber-300 text-amber-800", danger:"bg-red-50 border-red-300 text-red-800", success:"bg-emerald-50 border-emerald-300 text-emerald-800", info:"bg-blue-50 border-blue-300 text-blue-800" };
    const ic = { warn:"warning", danger:"error", success:"check_circle", info:"info" };
    return <div className={`flex items-start gap-3 p-4 rounded-xl border ${s[type]} text-sm font-medium`}><span className="material-symbols-outlined text-lg shrink-0 mt-0.5">{ic[type]}</span><span>{text}</span></div>;
};

                            <p className="text-xs text-slate-600 leading-relaxed mb-4">Es el conjunto de agentes de IA de Salesforce que actúan de forma autónoma dentro de los módulos que ya tenemos. Un agente puede diseñar campañas, gestionar conversaciones con clientes, asistir a asesores de cartera en tiempo real y personalizar el portal web — todo sin intervención manual constante.</p>

};

// ── NAV + APP ─────────────────────────────────────────────────────────────────
const NavPill = ({ active, label, onClick }) => (
    <button onClick={onClick} className={`h-full px-4 text-[11px] font-extrabold transition-all flex items-center whitespace-nowrap border-b-4 ${active?'text-[#004A3B] border-[#004A3B] bg-slate-50':'text-slate-400 border-transparent hover:text-slate-600 hover:bg-slate-50'}`}>{label}</button>
);
const App = () => {
    const [cv, setCv] = useState(View.INICIO);
    const [mob, setMob] = useState(false);
    useEffect(() => {
        const h = () => { const hash=window.location.hash.replace('#',''); if(Object.values(View).includes(hash)) setCv(hash); };
        window.addEventListener('hashchange',h); h();
        return () => window.removeEventListener('hashchange',h);
    },[]);
    const nav = v => { setCv(v); window.location.hash=v; setMob(false); window.scrollTo(0,0); };
    const navItems = [{view:View.INICIO,label:"Inicio"},{view:View.REUNION,label:"⭐ Reunión SF"},{view:View.NOVEDADES,label:"1. Novedades SF"},{view:View.COMUNICACIONES,label:"2. Cartera"},{view:View.DATA_CLOUD,label:"3. Data Cloud"},{view:View.WHATSAPP,label:"4. WhatsApp"},{view:View.CASOS_USO,label:"Casos de uso"},{view:View.ARQUITECTURA,label:"Arquitectura"},{view:View.AGENDA,label:"Agenda SF"}];
    const render = () => { switch(cv) { case View.INICIO: return <HomeView onNavigate={nav}/>; case View.REUNION: return <ReunionView onNavigate={nav}/>; case View.NOVEDADES: return <NovedadesView onNavigate={nav}/>; case View.COMUNICACIONES: return <ComunicacionesView onNavigate={nav}/>; case View.DATA_CLOUD: return <DataCloudView onNavigate={nav}/>; case View.WHATSAPP: return <WhatsappView onNavigate={nav}/>; case View.CASOS_USO: return <CasosUsoView/>; case View.ARQUITECTURA: return <ArquitecturaView/>; case View.AGENDA: return <AgendaView/>; default: return <HomeView onNavigate={nav}/>; } };
    return (
        <div className="flex flex-col h-screen bg-canvas-bg font-sans">
            <header className="no-print sticky top-0 z-50 bg-white border-b border-slate-200 h-20 shrink-0 shadow-sm">
                <div className="max-w-[1800px] mx-auto h-full flex items-center px-6">
                    <div className="flex items-center gap-4 shrink-0 mr-8 cursor-pointer" onClick={() => nav(View.INICIO)}>
                        <img src={logoUrl} alt="Seguros Bolívar" className="h-10 w-auto object-contain" />
                        <div className="h-10 w-[1px] bg-slate-200"></div>
                        <div className="flex flex-col leading-none"><span className="text-[12px] font-black text-[#004A3B] uppercase tracking-tight">Análisis</span><span className="text-[12px] font-black text-[#004A3B] uppercase tracking-tight">Salesforce 2026</span></div>
                    </div>
                    <nav className="hidden xl:flex items-center h-full flex-1 overflow-x-auto">
                        {navItems.map(item => <NavPill key={item.view} active={cv===item.view} label={item.label} onClick={() => nav(item.view)} />)}
                    </nav>
                    <div className="flex items-center gap-3 ml-4">
                        <button onClick={() => setMob(!mob)} className="xl:hidden p-2 text-slate-500 hover:bg-slate-100 rounded-lg"><span className="material-symbols-outlined">{mob?'close':'menu'}</span></button>
                    </div>
                </div>
                {mob && <div className="absolute top-20 left-0 w-full bg-white border-b border-slate-200 shadow-2xl xl:hidden z-50"><div className="p-4 grid grid-cols-2 gap-2">{navItems.map(item => <button key={item.view} onClick={() => nav(item.view)} className={`px-4 py-3 rounded-xl text-left text-[12px] font-bold ${cv===item.view?'bg-[#004A3B] text-white':'bg-slate-50 text-slate-600'}`}>{item.label}</button>)}</div></div>}
            </header>
            <main className="flex-1 overflow-y-auto bg-canvas-bg">
                <div className="max-w-[1400px] mx-auto p-6 md:p-10">{render()}</div>
            </main>
        </div>
    );
};
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
